<!DOCTYPE html>
<html lang="ko">
{% include '/comm/header.html' %}
<style>
    /* 본문 컨테이너 (따뜻한 베이지 배경) */
    .info-container {
        background-color: #fdf8f4;
        padding: 4rem 2rem;
        border-radius: 8px;
        color: #333;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    /* 상단 작은 타이틀 (교육) */
    .small-title {
        color: #3b5b8d; /* 차분한 네이비/블루톤 */
        border-bottom: 2px solid #3b5b8d;
        display: inline-block;
        padding-bottom: 5px;
        margin-bottom: 15px;
        font-weight: 600;
        font-size: 1.1rem;
    }

    /* 메인 타이틀 */
    .main-title {
        color: #5a3d2b; /* 진한 브라운 */
        font-weight: 700;
        font-size: 2.2rem;
        font-family: 'Gungsuh', '궁서', serif;
    }

    /* 구분선 */
    .custom-hr {
        border-top: 1px solid #9ba4b5;
        margin: 3rem 0;
        opacity: 0.5;
    }

    /* 서브 타이틀 (충효예교육사) */
    .sub-title {
        color: #5a3d2b;
        font-weight: 700;
        font-size: 1.8rem;
        font-family: 'Gungsuh', '궁서', serif;
        border-bottom: 1px solid #7b4a2b;
        display: inline-block;
        padding-bottom: 10px;
        min-width: 300px; /* 밑줄이 글자보다 조금 더 길게 나오도록 설정 */
    }

    /* 하단 정보 텍스트 영역 */
    .info-text-wrap {
        max-width: 700px; /* 텍스트가 너무 넓게 퍼지지 않도록 가운데 정렬용 최대 너비 설정 */
        margin: 0 auto;
        text-align: left;
    }

    /* 정보 섹션 제목 (1. 자격종목... 2. 자격관리...) */
    .info-heading {
        color: #2b4c7e;
        font-weight: 700;
        font-size: 1.15rem;
        margin-bottom: 12px;
    }

    /* 정보 리스트 (가, 나, 다...) */
    .info-list {
        list-style: none;
        padding-left: 0;
        color: #4a5568;
        font-size: 1.05rem;
        line-height: 1.8;
        font-weight: 500;
    }

    @media (max-width: 768px) {
        .info-container { padding: 2rem 1rem; }
        .main-title { font-size: 1.8rem; }
        .sub-title { font-size: 1.5rem; min-width: 200px; }
    }
</style>
