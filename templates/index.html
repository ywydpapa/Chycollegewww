<!DOCTYPE html>
<html lang="ko">
{% include '/comm/header.html' %}
<style>
    /* 슬라이더 이미지 높이 및 핏 설정 */
    .carousel-item img {
        height: 500px; /* 원하는 슬라이더 높이로 조절하세요 */
        object-fit: cover; /* 이미지가 찌그러지지 않고 꽉 차게 설정 */
    }

    /* 충효예 이념 섹션 스타일 */
    .ideology-section {
        background-color: #fdf5ec; /* 첨부해주신 이미지와 유사한 따뜻한 베이지 배경 */
        padding: 5rem 0;
    }

    .ideology-title-wrap {
        text-align: center;
        margin-bottom: 4rem;
    }

    .ideology-title {
        color: #2c3e50; /* 남색 계열 텍스트 */
        font-size: 1.5rem;
        font-weight: 600;
        position: relative;
        display: inline-block;
        padding-bottom: 10px;
    }

    /* 제목 아래 밑줄 */
    .ideology-title::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2px;
        background-color: #2c3e50;
    }

    .ideology-item {
        text-align: center;
        padding: 1rem;
    }

    .ideology-icon {
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
    }

    /* 임시 부트스트랩 아이콘 크기 */
    .ideology-icon i {
        font-size: 4.5rem;
    }

    .ideology-text {
        color: #2c3e50;
        font-size: 1.2rem;
        font-weight: 500;
    }

    /* 모바일 반응형 처리 */
    @media (max-width: 768px) {
        .carousel-item img { height: 300px; }
        .ideology-icon i { font-size: 3.5rem; }
        .ideology-icon { height: 80px; }
    }
</style>
<body>
    <!-- 상단 메뉴 영역 (컨테이너 안에서 중앙 정렬) -->
    <div class="container mt-2 mb-4">
        <div class="d-flex justify-content-end mb-3 top-bar">
            <a href="#" class="text-dark text-decoration-none d-flex align-items-center">
                <i class="bi bi-person-circle fs-5 me-1"></i> 로그인
            </a>
        </div>
        {% include '/comm/topmenu.html' %}

        <div class="section-title-wrapper mt-4">
            <div class="section-title-line"></div>
            <div class="section-title-text"> 사단법인 충효예대학 </div>
            <div class="section-title-line"></div>
        </div>
    </div> <!-- 상단 컨테이너 종료 -->
    <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="10000">
        <!-- 하단 인디케이터 (점) -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="3" aria-label="Slide 4"></button>
        </div>

        <!-- 슬라이드 이미지 -->
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/static/images/main03.png" class="d-block w-100" alt="메인 이미지 1">
            </div>
            <div class="carousel-item">
                <img src="/static/images/main04.png" class="d-block w-100" alt="메인 이미지 2">
            </div>
            <div class="carousel-item">
                <img src="/static/images/main09.png" class="d-block w-100" alt="메인 이미지 2">
            </div>
            <div class="carousel-item">
                <img src="/static/images/main10.png" class="d-block w-100" alt="메인 이미지 2">
            </div>
        </div>

        <!-- 좌우 이동 버튼 -->
        <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">이전</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">다음</span>
        </button>
    </div>

    <!-- 2. 충효예 이념 섹션 -->
    <div class="ideology-section">
        <div class="container">
            <div class="ideology-title-wrap">
                <h2 class="ideology-title">충효예 이념</h2>
            </div>

            <div class="row justify-content-center">
                <!-- 나라사랑 -->
                <div class="col-6 col-md-3 ideology-item">
                    <div class="ideology-icon">
                        <!-- 실제 이미지 사용 시 아래 i 태그를 지우고 img 태그를 활성화하세요 -->
                        <!-- <img src="/static/images/icon_nara.png" alt="나라사랑" style="width: 80px;"> -->
                        <i class="bi bi-globe-americas" style="color: #5cb85c;"></i>
                    </div>
                    <div class="ideology-text">나라사랑</div>
                </div>

                <!-- 부모사랑 -->
                <div class="col-6 col-md-3 ideology-item">
                    <div class="ideology-icon">
                        <!-- <img src="/static/images/icon_bumo.png" alt="부모사랑" style="width: 80px;"> -->
                        <i class="bi bi-people-fill" style="color: #a569bd;"></i>
                    </div>
                    <div class="ideology-text">부모사랑</div>
                </div>

                <!-- 이웃사랑 -->
                <div class="col-6 col-md-3 ideology-item">
                    <div class="ideology-icon">
                        <!-- <img src="/static/images/icon_iut.png" alt="이웃사랑" style="width: 80px;"> -->
                        <i class="bi bi-heart-fill" style="color: #d9534f;"></i>
                    </div>
                    <div class="ideology-text">이웃사랑</div>
                </div>

                <!-- 자연사랑 -->
                <div class="col-6 col-md-3 ideology-item">
                    <div class="ideology-icon">
                        <!-- <img src="/static/images/icon_jayeon.png" alt="자연사랑" style="width: 80px;"> -->
                        <i class="bi bi-tree-fill" style="color: #2e4053;"></i>
                    </div>
                    <div class="ideology-text">자연사랑</div>
                </div>
            </div>
        </div>
    </div>

    {% include '/comm/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
